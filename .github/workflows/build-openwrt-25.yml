name: Build OpenWrt 25.12 Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/**
    paths:
      - ".github/workflows/build-openwrt-25.yml"
      - "Makefile"
      - "htdocs/**"
      - "luasrc/**"
      - "root/**"
      - "README.md"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build With OpenWrt SDK Action
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-25.12.0
          FEEDNAME: action
          PACKAGES: luci-app-gpoint
          V: s
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          BUILD_LOG: 1

      - name: Verify Package Artifact
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$(find artifacts -type f \( -name 'luci-app-gpoint*.apk' -o -name 'luci-app-gpoint*.ipk' \))" ]; then
            echo "No luci-app-gpoint package artifact was produced." >&2
            exit 1
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-gpoint-openwrt-25.12.0
          path: artifacts/
          if-no-files-found: error
