name: Build OpenWrt 25.12 Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/**
    paths:
      - ".github/workflows/build-openwrt-25.yml"
      - "Makefile"
      - "htdocs/**"
      - "luasrc/**"
      - "root/**"
      - "README.md"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    env:
      OPENWRT_VERSION: 25.12.0
      OPENWRT_TARGET: x86
      OPENWRT_SUBTARGET: 64
      SDK_ARCHIVE: openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
      SDK_URL: https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget ca-certificates tar zstd patch time perl

      - name: Download And Extract SDK
        run: |
          set -eux
          wget -O "$SDK_ARCHIVE" "$SDK_URL"
          tar -xf "$SDK_ARCHIVE"

      - name: Build luci-app-gpoint
        shell: bash
        run: |
          set -euo pipefail

          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          mkdir -p artifacts

          cd "$SDK_DIR"

          ./scripts/feeds update base packages luci routing telephony
          ./scripts/feeds install -p base lua iwinfo libiwinfo-lua
          ./scripts/feeds install -p packages curl lua-rs232 luasocket lua-bit32 usbutils gpsd
          ./scripts/feeds install -p luci luci-base luci-compat

          rm -rf package/luci-app-gpoint
          mkdir -p package/luci-app-gpoint
          rsync -a --delete \
            --exclude .git \
            --exclude .github \
            --exclude .work \
            --exclude artifacts \
            "$GITHUB_WORKSPACE"/ \
            package/luci-app-gpoint/

          make defconfig
          make -j"$(nproc)" package/luci-app-gpoint/clean V=s
          make -j"$(nproc)" package/luci-app-gpoint/compile V=s 2>&1 | tee "$GITHUB_WORKSPACE/artifacts/build.log"

      - name: Collect Artifacts
        shell: bash
        run: |
          set -euo pipefail

          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          mkdir -p artifacts/package

          find "$SDK_DIR/bin" -type f \
            \( -name 'luci-app-gpoint*.apk' -o -name 'luci-app-gpoint*.ipk' \) \
            -exec cp {} artifacts/package/ \;

          if [ -z "$(find artifacts/package -maxdepth 1 -type f)" ]; then
            echo "No luci-app-gpoint package artifact was produced." >&2
            exit 1
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-gpoint-openwrt-25.12.0
          path: artifacts/
          if-no-files-found: error
